<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hybrid RAG AI Navigator</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        
        * { box-sizing: border-box; font-family: 'Inter', sans-serif; margin: 0; padding: 0; }
        body { 
            background: linear-gradient(135deg, #0f111a 0%, #171822 100%);
            color: #ffffff;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            width: 90%;
            max-width: 900px;
            height: 85vh;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 24px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
        }

        /* HEADER & UPLOAD */
        .header {
            padding: 24px 30px;
            background: rgba(0,0,0,0.2);
            border-bottom: 1px solid rgba(255,255,255,0.05);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .title { font-size: 1.4rem; font-weight: 600; background: linear-gradient(90deg, #bb86fc, #3700b3); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
        .upload-section { display: flex; gap: 10px; align-items: center;}
        input[type="file"] { display: none; }
        .upload-btn {
            background: #232533; border: 1px solid rgba(255,255,255,0.1); padding: 8px 16px; border-radius: 8px;
            cursor: pointer; transition: 0.3s; font-size: 0.9rem;
        }
        .upload-btn:hover { background: #bb86fc; color: #fff; }
        .submit-doc-btn {
            background: #bb86fc; color: #fff; border: none; padding: 8px 16px; border-radius: 8px; cursor: pointer; font-weight: 600; transition: 0.3s;
        }
        .submit-doc-btn:hover { background: #9965f4; box-shadow: 0 0 15px rgba(187,134,252,0.5); }
        .loader { display: none; margin-left: 10px; font-size: 0.8em; color: #bb86fc; }

        /* CHAT AREA */
        .chat-box {
            flex: 1; padding: 30px; overflow-y: auto; display: flex; flex-direction: column; gap: 20px;
        }
        .message { max-width: 80%; padding: 16px 20px; border-radius: 12px; line-height: 1.5; font-size: 0.95rem; animation: popIn 0.3s ease-out; }
        @keyframes popIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .bot-message {
            background: #232533; border: 1px solid rgba(255,255,255,0.05); align-self: flex-start;
            border-bottom-left-radius: 2px;
        }
        .user-message {
            background: linear-gradient(90deg, #bb86fc, #7b1fa2); align-self: flex-end;
            border-bottom-right-radius: 2px;
        }

        /* INPUT AREA */
        .input-area {
            padding: 20px 30px; background: rgba(0,0,0,0.2); border-top: 1px solid rgba(255,255,255,0.05); display: flex; gap: 12px;
        }
        input[type="text"] {
            flex: 1; background: #1c1e29; border: 1px solid rgba(255,255,255,0.1); color: #fff; padding: 16px; border-radius: 12px; font-size: 1rem; outline: none; transition: 0.3s;
        }
        input[type="text"]:focus { border-color: #bb86fc; box-shadow: 0 0 10px rgba(187,134,252,0.2); }
        .send-btn {
            background: #bb86fc; color: white; border: none; width: 55px; border-radius: 12px; cursor: pointer; transition: 0.3s; display: flex; justify-content: center; align-items: center;
        }
        .send-btn:hover { background: #9965f4; box-shadow: 0 0 15px rgba(187,134,252,0.5); }
        .send-btn svg { width: 24px; height: 24px; fill: white; }

        /* MARKDOWN TABLE STYLING */
        table { border-collapse: collapse; width: 100%; margin: 10px 0; background: rgba(255,255,255,0.05); border-radius: 8px; overflow: hidden; }
        th, td { border: 1px solid rgba(255,255,255,0.1); padding: 12px; text-align: left; }
        th { background: rgba(187,134,252,0.1); color: #bb86fc; font-weight: 600; }
        tr:nth-child(even) { background: rgba(255,255,255,0.02); }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>

<div class="container">
    <div class="header">
        <div class="title">RAG Chatbot Protocol</div>
        <div class="upload-section">
            <label class="upload-btn" for="pdf-input">Choose PDF</label>
            <input type="file" id="pdf-input" accept="application/pdf">
            <span id="file-name" style="font-size: 0.8rem; color: #aaa;">No file chosen</span>
            <button class="submit-doc-btn" id="upload-btn">Upload & Build Brain</button>
            <div class="loader" id="upload-loader">Synthesizing Vector & Graph...</div>
        </div>
    </div>

    <div class="chat-box" id="chat-box">
        <div class="message bot-message">Hello! Please upload a PDF using the button above. Once the database is built, I will be ready to synthesize the knowledge.</div>
    </div>

    <div class="input-area">
        <input type="text" id="chat-input" placeholder="Type your question..." autocomplete="off">
        <button class="send-btn" id="send-btn">
            <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
        </button>
    </div>
</div>

<script>
    const fileInput = document.getElementById('pdf-input');
    const fileName = document.getElementById('file-name');
    const uploadBtn = document.getElementById('upload-btn');
    const uploadLoader = document.getElementById('upload-loader');
    const chatBox = document.getElementById('chat-box');
    const chatInput = document.getElementById('chat-input');
    const sendBtn = document.getElementById('send-btn');

    fileInput.addEventListener('change', () => {
        fileName.textContent = fileInput.files[0] ? fileInput.files[0].name : "No file chosen";
    });

    // Upload PDF logic
    uploadBtn.addEventListener('click', async () => {
        if (!fileInput.files[0]) {
            alert("Please select a file first.");
            return;
        }
        const formData = new FormData();
        formData.append('file', fileInput.files[0]);
        
        uploadLoader.style.display = "block";
        uploadBtn.style.display = "none";
        
        try {
            const res = await fetch('/upload', { method: 'POST', body: formData });
            const data = await res.json();
            if (res.ok) {
                appendMessage("bot", data.message);
                if (data.graph_status === "failed") {
                    appendMessage("bot", "⚠️ Note: Your Knowledge Graph could not be built. You can still chat using semantic search, but complex relationship queries may be limited.");
                }
            } else {
                appendMessage("bot", "Error: " + data.error);
            }
        } catch (err) {
            appendMessage("bot", "Failed to connect to server.");
        } finally {
            uploadLoader.style.display = "none";
            uploadBtn.style.display = "block";
        }
    });

    // Combined Build logic - The separate /build_graph is now obsolete

    // Chat logic
    async function sendMessage() {
        const text = chatInput.value.trim();
        if (!text) return;

        appendMessage("user", text);
        chatInput.value = '';
        
        const loadingId = appendMessage("bot", "Thinking...");

        try {
            const res = await fetch('/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: text })
            });
            const data = await res.json();
            const botDiv = document.getElementById(loadingId);
            if (res.ok) {
                botDiv.innerHTML = marked.parse(data.answer);
            } else {
                botDiv.innerText = "Error: " + data.error;
            }
        } catch (err) {
            document.getElementById(loadingId).innerText = "Network Error.";
        }
    }

    sendBtn.addEventListener('click', sendMessage);
    chatInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') sendMessage();
    });

    function appendMessage(sender, text) {
        const div = document.createElement('div');
        div.className = `message ${sender}-message`;
        if (sender === "bot") {
            div.innerHTML = marked.parse(text);
        } else {
            div.innerText = text;
        }
        const id = `msg-${Date.now()}`;
        div.id = id;
        chatBox.appendChild(div);
        chatBox.scrollTop = chatBox.scrollHeight;
        return id;
    }
</script>

</body>
</html>
